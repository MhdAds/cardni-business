  <path d="M 6 12 Q 6 6 12 5 Q 18 6 18 12" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Helmet visor line -->
  <path d="M 8 11 L 16 11" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Helmet cheek pieces -->
  <path d="M 6.5 11 L 5 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 17.5 11 L 19 14" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Pan/skillet at bottom -->
  <ellipse cx="12" cy="17" rx="4.5" ry="1.5" fill="none" stroke="white" stroke-width="1.3"/>
  <!-- Pan handle -->
  <path d="M 17 17 L 20 15" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Helmet center detail -->

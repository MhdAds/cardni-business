  <!-- Snake body curves -->
  <path d="M 6 6 Q 8 8 10 8" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
  <path d="M 18 6 Q 16 8 14 8" fill="none" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
